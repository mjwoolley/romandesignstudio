<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Watercolor edge texture -->
    <filter id="wc-main" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.025" numOctaves="5" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="3" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in" result="comp"/>
      <feMerge><feMergeNode in="comp"/></feMerge>
    </filter>
    <filter id="wc-soft" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.045 0.03" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="2.5"/>
    </filter>
    <filter id="wc-rough" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.05" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.5"/>
    </filter>
    <!-- Translucency gradient -->
    <radialGradient id="fade-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- === LAYER 1: Wide amber wash sweeping across top-left === -->
  <g filter="url(#wc-main)" opacity="0.52">
    <path d="M -80,0 Q 120,-20 280,55 Q 440,125 580,90 Q 700,60 820,105 Q 960,155 1100,90 Q 1250,30 1480,70 L 1480,-60 L -80,-60 Z"
          fill="#d49442"/>
    <path d="M -80,15 Q 100,5 260,70 Q 430,140 600,100 Q 740,68 880,115 Q 1020,162 1200,95 Q 1350,42 1480,80 L 1480,-60 L -80,-60 Z"
          fill="#e8aa55" opacity="0.6"/>
  </g>

  <!-- === LAYER 2: Main flowing swoosh body === -->
  <g filter="url(#wc-main)" opacity="0.48">
    <path d="M -60,10 Q 180,130 420,105 Q 600,85 720,155 Q 820,215 740,285 Q 670,340 540,285 Q 400,225 260,245 Q 130,260 40,200 Q -40,155 -60,10 Z"
          fill="#c8853c"/>
    <path d="M -40,25 Q 160,120 390,98 Q 580,78 700,145 Q 800,202 720,270 Q 652,320 525,268 Q 390,210 245,232 Q 120,248 35,192 Q -25,148 -40,25 Z"
          fill="#dda050" opacity="0.55"/>
  </g>

  <!-- === LAYER 3: Petal / leaf overlap shape (upper center-right) === -->
  <g filter="url(#wc-soft)" opacity="0.50">
    <ellipse cx="730" cy="88" rx="255" ry="98" transform="rotate(-18 730 88)" fill="#b87830"/>
    <ellipse cx="710" cy="96" rx="210" ry="78" transform="rotate(-22 710 96)" fill="#cc9245" opacity="0.65"/>
    <ellipse cx="750" cy="78" rx="160" ry="60" transform="rotate(-12 750 78)" fill="#e0a84e" opacity="0.4"/>
  </g>

  <!-- === LAYER 4: Secondary amber wash, right side bleed === -->
  <g filter="url(#wc-soft)" opacity="0.38">
    <path d="M 900,0 Q 1050,40 1150,20 Q 1300,-10 1480,30 L 1480,180 Q 1320,160 1180,190 Q 1060,215 950,170 Q 860,135 900,0 Z"
          fill="#c8853c"/>
  </g>

  <!-- === LAYER 5: Terracotta brushstroke — lower right === -->
  <g filter="url(#wc-rough)" opacity="0.55">
    <path d="M 1020,350 Q 1120,325 1220,345 Q 1340,368 1480,335 L 1480,415 Q 1350,400 1230,385 Q 1110,372 1010,395 Z"
          fill="#9c4c35"/>
    <path d="M 1055,358 Q 1155,336 1245,354 Q 1355,374 1480,348 L 1480,400 Q 1360,390 1252,375 Q 1148,360 1055,378 Z"
          fill="#b55e45" opacity="0.55"/>
  </g>

  <!-- === LAYER 6: Botanical accent — dark green sprig, lower right corner === -->
  <g filter="url(#wc-rough)" opacity="0.60" transform="translate(1310, 355)">
    <!-- stem -->
    <path d="M 20,90 Q 22,60 18,30 Q 15,10 20,-5" stroke="#3a4a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- leaves -->
    <ellipse cx="14" cy="20" rx="14" ry="7" transform="rotate(-35 14 20)" fill="#3a4a2e" opacity="0.85"/>
    <ellipse cx="26" cy="38" rx="13" ry="6" transform="rotate(30 26 38)" fill="#4a5a3a" opacity="0.75"/>
    <ellipse cx="12" cy="52" rx="15" ry="6" transform="rotate(-40 12 52)" fill="#3a4a2e" opacity="0.8"/>
    <ellipse cx="28" cy="67" rx="12" ry="5" transform="rotate(25 28 67)" fill="#4a5a3a" opacity="0.7"/>
    <ellipse cx="10" cy="78" rx="13" ry="5" transform="rotate(-30 10 78)" fill="#3a4a2e" opacity="0.75"/>
  </g>

  <!-- Subtle highlight to add paper-like luminosity -->
  <rect width="1400" height="500" fill="url(#fade-center)" opacity="0.3"/>
</svg>
