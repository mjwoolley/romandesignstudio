<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Soft watercolor edge distortion -->
    <filter id="wc" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.018" numOctaves="5" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feGaussianBlur in="d" stdDeviation="5" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="wc-dark" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.028 0.022" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feGaussianBlur in="d" stdDeviation="6" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="wc-lotus" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.03" numOctaves="4" seed="6" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="d"/>
      <feGaussianBlur in="d" stdDeviation="2.5"/>
    </filter>

    <!-- Circle gradients matching card palette -->
    <!-- Warm peach/salmon — main large circle -->
    <radialGradient id="g-peach" cx="38%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#e8b48a" stop-opacity="0.70"/>
      <stop offset="40%"  stop-color="#d4906a" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#c07050" stop-opacity="0.22"/>
    </radialGradient>
    <!-- Deep terracotta/burnt sienna — lower left -->
    <radialGradient id="g-terra" cx="40%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#c86845" stop-opacity="0.72"/>
      <stop offset="50%"  stop-color="#b05030" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8a3820" stop-opacity="0.20"/>
    </radialGradient>
    <!-- Soft blush/cream — upper right, lighter -->
    <radialGradient id="g-blush" cx="42%" cy="40%" r="58%">
      <stop offset="0%"   stop-color="#f2d8c8" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#e0c0a8" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ccaa90" stop-opacity="0.15"/>
    </radialGradient>
    <!-- Near-black charcoal — upper right dominant -->
    <radialGradient id="g-dark" cx="45%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#2c2822" stop-opacity="0.88"/>
      <stop offset="55%"  stop-color="#1e1a14" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0e0a08" stop-opacity="0.28"/>
    </radialGradient>
    <!-- Lotus petal gradient -->
    <radialGradient id="g-lotus" cx="50%" cy="70%" r="50%">
      <stop offset="0%"   stop-color="#f0d0b8" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#e0b090" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c88060" stop-opacity="0.30"/>
    </radialGradient>
  </defs>

  <!-- === CIRCLE 1: Large warm peach/salmon — left-center, biggest === -->
  <g filter="url(#wc)">
    <circle cx="310" cy="360" r="320" fill="url(#g-peach)"/>
  </g>

  <!-- === CIRCLE 2: Mid peach overlapping right of first === -->
  <g filter="url(#wc)">
    <circle cx="580" cy="270" r="255" fill="url(#g-peach)" opacity="0.75"/>
  </g>

  <!-- === CIRCLE 3: Soft blush — upper left bleed === -->
  <g filter="url(#wc)">
    <circle cx="55" cy="100" r="220" fill="url(#g-blush)"/>
  </g>

  <!-- === CIRCLE 4: Deep terracotta — lower left, punchy === -->
  <g filter="url(#wc)">
    <circle cx="120" cy="530" r="240" fill="url(#g-terra)"/>
  </g>

  <!-- === CIRCLE 5: Near-black charcoal — upper right, partially cropped === -->
  <g filter="url(#wc-dark)">
    <circle cx="1270" cy="60" r="330" fill="url(#g-dark)"/>
  </g>

  <!-- === CIRCLE 6: Smaller terracotta echo — right side === -->
  <g filter="url(#wc)" opacity="0.55">
    <circle cx="980" cy="430" r="150" fill="#c06848" opacity="0.38"/>
  </g>

  <!-- === LOTUS — center, watercolor painted === -->
  <g filter="url(#wc-lotus)" transform="translate(820, 175)">
    <!-- Outer petals (8 petals, rotated) -->
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(0)"   fill="url(#g-lotus)" opacity="0.72"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(45)"  fill="url(#g-lotus)" opacity="0.68"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(90)"  fill="url(#g-lotus)" opacity="0.72"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(135)" fill="url(#g-lotus)" opacity="0.68"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(180)" fill="url(#g-lotus)" opacity="0.72"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(225)" fill="url(#g-lotus)" opacity="0.68"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(270)" fill="url(#g-lotus)" opacity="0.72"/>
    <ellipse cx="0" cy="-88" rx="28" ry="72" transform="rotate(315)" fill="url(#g-lotus)" opacity="0.68"/>
    <!-- Inner petals (slightly smaller, offset) -->
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(22.5)"  fill="#e8c0a0" opacity="0.80"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(67.5)"  fill="#e8c0a0" opacity="0.75"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(112.5)" fill="#e8c0a0" opacity="0.80"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(157.5)" fill="#e8c0a0" opacity="0.75"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(202.5)" fill="#e8c0a0" opacity="0.80"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(247.5)" fill="#e8c0a0" opacity="0.75"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(292.5)" fill="#e8c0a0" opacity="0.80"/>
    <ellipse cx="0" cy="-62" rx="20" ry="52" transform="rotate(337.5)" fill="#e8c0a0" opacity="0.75"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="28" fill="#d49878" opacity="0.70"/>
    <circle cx="0" cy="0" r="16" fill="#e8b890" opacity="0.80"/>
    <circle cx="0" cy="0" r="8"  fill="#f0d0b0" opacity="0.90"/>
  </g>
</svg>
